<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password बदला - धनलक्ष्मी शेवई</title>
    <script src="auth.js"></script>
    <script>
        // Login Check
        if (sessionStorage.getItem('adminLoggedIn') !== 'true') {
            window.location.replace('login.html');
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans Devanagari', Arial, sans-serif;
            background: linear-gradient(135deg, #FFF4E6 0%, #FFF8F0 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 40px auto;
        }
        .header {
            background: linear-gradient(135deg, #FF9800, #F57C00);
            padding: 25px;
            border-radius: 14px 14px 0 0;
            text-align: center;
        }
        .header h1 {
            color: white;
            font-size: 26px;
            margin-bottom: 5px;
        }
        .header p {
            color: #FFF3E0;
            font-size: 14px;
        }
        .card {
            background: #FFFEF8;
            padding: 40px 35px;
            border-radius: 0 0 14px 14px;
            box-shadow: 0 10px 40px rgba(245, 124, 0, 0.18);
            border: 2px solid #FFE0B2;
            border-top: none;
        }
        .user-info {
            background: #FFF3E0;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            text-align: center;
        }
        .user-info strong {
            color: #F57C00;
            font-size: 18px;
        }
        .form-group {
            margin-bottom: 22px;
        }
        .form-group label {
            display: block;
            color: #3E2723;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 13px 15px;
            border: 2px solid #FFE0B2;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #F57C00;
            box-shadow: 0 0 0 3px rgba(245, 124, 0, 0.1);
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 12px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #FF9800, #F57C00);
            color: white;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #F57C00, #E65100);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 124, 0, 0.3);
        }
        .btn-secondary {
            background: #6D4C41;
            color: white;
        }
        .btn-secondary:hover {
            background: #5D4037;
        }
        .message {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
            font-size: 14px;
        }
        .message.success {
            background: #E8F5E9;
            color: #2E7D32;
            border: 1px solid #A5D6A7;
        }
        .message.error {
            background: #FFEBEE;
            color: #C62828;
            border: 1px solid #EF9A9A;
        }
        .rules {
            background: #FFF8E1;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 13px;
            color: #6D4C41;
        }
        .rules li {
            margin: 5px 0 5px 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 Password बदला</h1>
            <p>तुमचा Password Secure ठेवा</p>
        </div>
        
        <div class="card">
            <div class="user-info">
                <p>Logged in as: <strong id="currentUserName">Loading...</strong></p>
            </div>

            <div class="message" id="messageBox"></div>

            <form id="changePassForm">
                <div class="form-group">
                    <label>जुना Password *</label>
                    <input type="password" id="oldPassword" placeholder="Current Password" required>
                </div>
                <div class="form-group">
                    <label>नवीन Password *</label>
                    <input type="password" id="newPassword" placeholder="New Password" required>
                </div>
                <div class="form-group">
                    <label>नवीन Password Confirm करा *</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm New Password" required>
                </div>
                <button type="submit" class="btn btn-primary">Password Update करा</button>
                <button type="button" class="btn btn-secondary" onclick="window.location.href='admin.html'">← Dashboard ला परत जा</button>
            </form>

            <div class="rules">
                <strong>Password Rules:</strong>
                <ul>
                    <li>किमान 6 अक्षरी पाहिजे</li>
                    <li>Strong Password वापरा - Numbers + Letters</li>
                    <li>इतरांना Password सांगू नका</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        // User Name दाखव
        const user = getCurrentUser();
        if (user) {
            document.getElementById('currentUserName').textContent = user.name;
        }

        // Form Submit
        document.getElementById('changePassForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const oldPass = document.getElementById('oldPassword').value;
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;
            const msgBox = document.getElementById('messageBox');

            // Validation
            if (newPass!== confirmPass) {
                showMessage('नवीन Password आणि Confirm Password जुळत नाही!', 'error');
                return;
            }

            // Change Password Call
            const result = changePassword(oldPass, newPass);

            if (result.success) {
                showMessage(result.msg + ' आता नवीन Password ने Login करा.', 'success');
                document.getElementById('changePassForm').reset();
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 2000);
            } else {
                showMessage(result.msg, 'error');
            }
        });

        function showMessage(text, type) {
            const msgBox = document.getElementById('messageBox');
            msgBox.textContent = text;
            msgBox.className = 'message ' + type;
            msgBox.style.display = 'block';
            setTimeout(() => {
                msgBox.style.display = 'none';
            }, 4000);
        }
    </script>
</body>
</html>
