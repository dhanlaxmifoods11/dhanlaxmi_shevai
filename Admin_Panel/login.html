<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>धनलक्ष्मी शेवई - Admin Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans Devanagari', Arial, sans-serif;
            background: linear-gradient(135deg, #FFF4E6 0%, #FFF8F0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-box {
            background: #FFFEF8;
            padding: 45px 40px;
            border-radius: 14px;
            box-shadow: 0 10px 40px rgba(245, 124, 0, 0.18);
            border: 2px solid #FFE0B2;
            max-width: 420px;
            width: 100%;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            color: #F57C00;
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
        }
        .logo p {
            color: #6D4C41;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 22px;
        }
        .form-group label {
            display: block;
            color: #3E2723;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 13px 15px;
            border: 2px solid #FFE0B2;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s;
            font-family: inherit;
        }
        .form-group input:focus {
            outline: none;
            border-color: #F57C00;
            box-shadow: 0 0 0 3px rgba(245, 124, 0, 0.1);
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #FF9800, #F57C00);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .login-btn:hover {
            background: linear-gradient(135deg, #F57C00, #E65100);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 124, 0, 0.3);
        }
        .error {
            background: #FFEBEE;
            color: #C62828;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
            font-size: 14px;
        }
    </style>

    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#DC2626">
    <link rel="apple-touch-icon" href="./icon-192.png">
    <meta name="mobile-web-app-capable" content="yes">

    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js');
    }
    </script>
    
</head>
<body>
    <div class="login-box">
        <div class="logo">
            <h1>धनलक्ष्मी शेवई</h1>
            <p>Admin Panel Login</p>
        </div>
        
        <div class="error" id="errorMsg">चुकीचा Username किंवा Password!</div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="admin" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="login-btn">Login करा</button>
        </form>
    </div>
    <script src="auth.js"></script>
</body>
</html>
